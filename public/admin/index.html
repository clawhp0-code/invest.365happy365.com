<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        load_config_file: false,
        backend: {
          name: "github",
          repo: "clawhp0-code/blog.365happy365.com",
          branch: "main",
          base_url: "https://blog.365happy365.com",
          auth_endpoint: "/api/auth"
        },
        media_folder: "public/images/posts",
        public_folder: "/images/posts",
        collections: [
          {
            name: "posts",
            label: "Blog Posts",
            folder: "content/posts",
            create: true,
            slug: "{{slug}}",
            extension: "mdx",
            format: "frontmatter",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Description", name: "description", widget: "text" },
              { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" },
              { label: "Category", name: "category", widget: "string" },
              { label: "Tags", name: "tags", widget: "list", default: [] },
              { label: "Featured", name: "featured", widget: "boolean", default: false },
              { label: "Draft", name: "draft", widget: "boolean", default: false },
              { label: "Cover Image", name: "coverImage", widget: "image", required: false },
              { label: "Body", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
