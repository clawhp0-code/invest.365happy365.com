name: Daily Bitcoin Post

on:
  schedule:
    # 매일 오전 7시 (UTC+9 한국 시간 기준, UTC 22:00)
    - cron: "0 22 * * *"
  workflow_dispatch: # 수동 트리거 옵션

jobs:
  generate-bitcoin-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Bitcoin post
        run: node scripts/bitcoin-daily.mjs

      - name: Check for changes
        id: git-status
        run: |
          if git diff --quiet; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-status.outputs.has-changes == 'true'
        run: |
          git config user.name "bitcoin-bot"
          git config user.email "bitcoin-bot@blog.365happy365.com"
          git add content/posts/bitcoin-*.mdx public/bitcoin-chart.svg
          git commit -m "📈 publish: daily bitcoin post"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
